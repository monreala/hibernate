version: '3.8'

services:
  mysql-db:
    image: mysql:8.0
    container_name: carhire_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: carhire_db
      MYSQL_USER: car_user
      MYSQL_PASSWORD: car_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
